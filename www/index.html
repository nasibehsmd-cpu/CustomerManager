<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>انتخاب نیک - مدیریت مشتریان</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<div id="homePage" class="page">


<div class="container">


<h1>🏢 انتخاب نیک</h1>

<p class="subtitle">
سیستم مدیریت مشتریان
</p>



<div class="searchBox">


<input

type="text"

id="searchBox"

placeholder="نام مشتری، آدرس یا شماره موبایل">


<button id="searchBtn">

🔍 جستجو

</button>


</div>



<div id="result">


<div class="welcome">


<h2>
خوش آمدید
</h2>


<p>
نام مشتری، آدرس یا شماره موبایل را وارد کنید.
</p>


</div>


</div>


</div>


</div><!-- ======================================
     صفحه تلفن
====================================== -->

<div id="phonePage" class="page hidden">


<div class="phoneBox">


<h2>
📞 تلفن
</h2>



<input

type="text"

id="dialNumber"

placeholder="شماره را وارد کنید">



<div class="dialpad">



<button class="dialKey">1</button>

<button class="dialKey">2</button>

<button class="dialKey">3</button>



<button class="dialKey">4</button>

<button class="dialKey">5</button>

<button class="dialKey">6</button>



<button class="dialKey">7</button>

<button class="dialKey">8</button>

<button class="dialKey">9</button>



<button class="dialKey">*</button>

<button class="dialKey">0</button>

<button class="dialKey">#</button>



</div>




<div class="phoneButtons">


<button id="callBtn">

📞 تماس

</button>



<button id="clearBtn">

⌫ پاک کردن

</button>



</div>


</div>


</div><!-- ======================================
     صفحه پیامک
====================================== -->

<div id="smsPage" class="page hidden">


<div class="phoneBox">


<h2>
💬 پیامک
</h2>



<input

type="text"

id="smsNumber"

placeholder="شماره گیرنده">



<textarea

id="smsText"

placeholder="متن پیام">

</textarea>



<button class="action" id="sendSmsBtn">

ارسال پیام

</button>


</div>


</div>





<!-- ======================================
     صفحه مخاطبین
====================================== -->

<div id="contactsPage" class="page hidden">


<div class="phoneBox">


<h2>
👥 مخاطبین
</h2>



<div id="contactList">

در حال آماده سازی مخاطبین...

</div>


</div>


</div><!-- ======================================
     منوی پایین صفحه
====================================== -->


<div class="bottomNav">


<button id="homeTab">

🏠

<span>
خانه
</span>

</button>



<button id="phoneTab">

📞

<span>
تلفن
</span>

</button>



<button id="smsTab">

💬

<span>
پیام
</span>

</button>



<button id="contactsTab">

👥

<span>
مخاطبین
</span>

</button>



</div>





<script src="script.js"></script>


</body>


</html>
