<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مدیریت مشتریان انتخاب نیک</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🏢 انتخاب نیک</h1>

<p class="subtitle">
سیستم مدیریت مشتریان
</p>

<div class="searchBox">

<input
type="text"
id="searchBox"
placeholder="نام مشتری، آدرس یا شماره موبایل">

<button id="searchBtn">

🔍 جستجو

</button>

</div>

<div id="result">

<div class="welcome">

<h2>خوش آمدید</h2>

<p>

نام مشتری، آدرس یا شماره موبایل را وارد کنید.

</p>

</div>

</div>

</div>
<div id="phonePage" class="hidden">

<h2>📞 تلفن</h2>

<input type="text" id="dialNumber" placeholder="شماره را وارد کنید">

<div class="dialpad">

<button>1</button>
<button>2</button>
<button>3</button>

<button>4</button>
<button>5</button>
<button>6</button>

<button>7</button>
<button>8</button>
<button>9</button>

<button>*</button>
<button>0</button>
<button>#</button>

</div>

<div class="phoneButtons">

<button id="callBtn">📞 تماس</button>

<button id="clearBtn">⌫ حذف</button>

</div>

</div>

<div class="bottomNav">

<button id="homeTab">🏠</button>

<button id="phoneTab">📞</button>

<button id="smsTab">💬</button>

<button id="contactsTab">👥</button>

</div>

<script src="script.js"></script>

</body>

</html>
